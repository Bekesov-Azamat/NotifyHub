services:
  app:
    build: .
    container_name: notifyhub_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    depends_on:
      - pgsql

  pgsql:
    image: postgres:16
    container_name: notifyhub_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifyhub
      POSTGRES_USER: notifyhub_user
      POSTGRES_PASSWORD: notifyhub_password
    ports:
      - "5434:5432"
    volumes:
      - notifyhub_pgsql_data:/var/lib/postgresql/data

volumes:
  notifyhub_pgsql_data:
